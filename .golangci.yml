version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    govet:
      enable-all: false
  exclusions:
    rules:
      # Ignore errors on rows.Scan in API handlers — handled by empty result
      - path: pkg/server/api.go
        linters: [errcheck]
        text: "rows.Scan"
