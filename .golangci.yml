version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    govet:
      enable-all: false
  exclusions:
    rules:
      # Pre-existing: server ignores best-effort exec/rollback errors
      - path: pkg/server/
        linters: [errcheck]
      # Pre-existing: informer handler registration error is non-fatal
      - path: pkg/agent/watcher\.go
        linters: [errcheck]
      # Pre-existing: best-effort close on agent shutdown
      - path: pkg/agent/agent\.go
        linters: [errcheck]
      # Pre-existing: MarkFlagRequired and log.Sync are best-effort in agent main
      - path: cmd/agent/main\.go
        linters: [errcheck]
