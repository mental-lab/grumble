apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "grumble-agent.serviceAccountName" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "grumble-agent.fullname" . }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "grumble-agent.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "grumble-agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "grumble-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
