name: Wolfi Scheduled Scan

on:
  schedule:
    # Weekly: every Monday 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  actions: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - grumble-agent
          - grumble-server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install grype + cosign
        run: |
          set -eux
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL -o /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x /usr/local/bin/cosign

      - name: Pull SBOM attached by apko
        id: sbom
        run: |
          set -eux
          IMG="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:wolfi-style"
          # apko publish attaches SPDX SBOMs to the image as OCI referrers.
          # cosign download sbom writes them to stdout; pipe to a file.
          cosign download sbom "${IMG}" > sbom-${{ matrix.image }}.spdx.json
          head -c 400 sbom-${{ matrix.image }}.spdx.json; echo

      - name: Scan build-time SBOM with Grype
        id: scan
        run: |
          set -eux
          grype "sbom:sbom-${{ matrix.image }}.spdx.json" \
            -o sarif --file grype-${{ matrix.image }}.sarif || true
          grype "sbom:sbom-${{ matrix.image }}.spdx.json" \
            -o table --file grype-${{ matrix.image }}.txt || true
          cat grype-${{ matrix.image }}.txt

      - name: Upload Grype SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: grype-${{ matrix.image }}.sarif
          category: wolfi-scheduled-${{ matrix.image }}

      - name: Upload SBOM + reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scan-${{ matrix.image }}-${{ github.run_id }}
          path: |
            sbom-${{ matrix.image }}.spdx.json
            grype-${{ matrix.image }}.*
