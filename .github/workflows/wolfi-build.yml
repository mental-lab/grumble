name: Wolfi Build

on:
  push:
    branches: [wolfi-style]
    tags: ['v*']
  pull_request:
    branches: [wolfi-style]
  schedule:
    # Weekly rebuild to pick up fresh Wolfi apks (CVE patches in toolchain
    # and runtime libs ship continuously to https://packages.wolfi.dev/os).
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Generate a single melange signing keypair for this workflow run and share
  # it across build jobs so all per-arch apks are signed by the same key.
  keygen:
    runs-on: ubuntu-latest
    steps:
      - uses: chainguard-dev/actions/setup-melange@0cba302c40fce067ec0d39f1d91b10580d4b06b0 # main

      - name: Generate melange signing key
        run: melange keygen melange.rsa

      - name: Upload signing key
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: melange-key
          path: |
            melange.rsa
            melange.rsa.pub
          retention-days: 1

  # Per-(component, arch) native apk build. Native ARM runners skip QEMU,
  # cutting build time ~4-5x compared to emulated cross-builds.
  build-apk:
    needs: keygen
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: grumble-agent
            arch: x86_64
            runner: ubuntu-latest
          - component: grumble-agent
            arch: aarch64
            runner: ubuntu-24.04-arm
          - component: grumble-server
            arch: x86_64
            runner: ubuntu-latest
          - component: grumble-server
            arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: chainguard-dev/actions/setup-melange@0cba302c40fce067ec0d39f1d91b10580d4b06b0 # main

      - name: Download signing key
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: melange-key

      - name: Build apk (${{ matrix.arch }})
        run: |
          set -eux
          melange build \
            ".melange/${{ matrix.component }}.yaml" \
            --arch "${{ matrix.arch }}" \
            --signing-key melange.rsa \
            --runner docker \
            --source-dir "$PWD" \
            --out-dir ./packages

      - name: Upload apk
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apk-${{ matrix.component }}-${{ matrix.arch }}
          path: packages/
          retention-days: 1

  # Combine per-arch apks into a multi-arch OCI image with apko.
  # apko doesn't execute target-arch binaries during publish (it just lays
  # out filesystems from apks), so this job runs fine on ubuntu-latest
  # without QEMU.
  publish-image:
    needs: build-apk
    strategy:
      fail-fast: false
      matrix:
        component: [grumble-agent, grumble-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install apko
        env:
          APKO_VERSION: "1.2.7"
        run: |
          set -eux
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          curl -sSfL -o /tmp/apko.tgz \
            "https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_${OS}_amd64.tar.gz"
          tar -xzf /tmp/apko.tgz -C /tmp
          sudo mv /tmp/apko_*/apko /usr/local/bin/apko
          apko version

      - name: Download signing key
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: melange-key

      - name: Download apks for ${{ matrix.component }}
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          pattern: apk-${{ matrix.component }}-*
          path: packages/
          merge-multiple: true

      - name: Inspect packages layout
        run: |
          set -eux
          find packages -type f | sort

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -eux
          IMG="${REGISTRY}/${IMAGE_OWNER}/${{ matrix.component }}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAGS="${IMG}:sha-${SHORT_SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VTAG="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS} ${IMG}:${VTAG} ${IMG}:latest"
          elif [[ "${GITHUB_REF}" == refs/heads/wolfi-style ]]; then
            TAGS="${TAGS} ${IMG}:wolfi-style"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "primary=${IMG}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build OCI image with apko (PR = local only)
        if: github.event_name == 'pull_request'
        run: |
          set -eux
          mkdir -p ./sboms
          apko build \
            "apko/${{ matrix.component }}.yaml" \
            "${{ steps.tags.outputs.primary }}" \
            ./image.tar \
            -k melange.rsa.pub \
            --sbom-path ./sboms \
            --arch x86_64,aarch64

      - name: Publish OCI image with apko
        if: github.event_name != 'pull_request'
        id: apko
        run: |
          set -eux
          mkdir -p ./sboms
          apko publish \
            "apko/${{ matrix.component }}.yaml" \
            ${{ steps.tags.outputs.tags }} \
            -k melange.rsa.pub \
            --sbom-path ./sboms \
            --arch x86_64,aarch64 \
            | tee apko.out
          DIGEST="$(tail -n1 apko.out)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Upload SBOMs as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sboms-${{ matrix.component }}
          path: ./sboms/
          if-no-files-found: warn

      - name: Scan apko-generated SBOM with Grype
        if: github.event_name != 'pull_request'
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          # Scan the SBOM apko produced rather than re-inferring from the
          # image, for an authoritative verdict on what was actually built.
          sbom: ./sboms/sbom-x86_64.spdx.json
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype SARIF
        if: github.event_name != 'pull_request' && steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: wolfi-${{ matrix.component }}

  release:
    needs: publish-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Download all SBOMs
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          path: sboms
          pattern: sboms-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2
        with:
          generate_release_notes: true
          files: sboms/**/*
