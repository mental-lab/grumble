contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - ./melange.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
    - '@local ./packages'
  packages:
    - ca-certificates-bundle
    - tzdata
    - grumble-agent@local

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/grumble-agent

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.source: https://github.com/mental-lab/grumble
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.description: Grumble agent (Wolfi-based)
  org.opencontainers.image.vendor: mental-lab
